<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Eventra icon">
  <defs>
    <!-- Premium blue gradient: Indigo to Violet to Blue -->
    <linearGradient id="premiumBlue" x1="0%" y1="0%" x2="150%" y2="150%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="iconGlow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer circle background -->
  <circle cx="128" cy="128" r="125" fill="#07091A"/>

  <!-- Main gradient circle -->
  <circle cx="128" cy="128" r="115" fill="url(#premiumBlue)" filter="url(#iconGlow)"/>

  <!-- Inner accent circle -->
  <circle cx="128" cy="128" r="100" fill="rgba(255, 255, 255, 0.05)"/>

  <!-- Bold E letter -->
  <text x="128" y="140" font-family="Arial, Helvetica, sans-serif" font-size="110" font-weight="bold" text-anchor="middle" fill="white" opacity="0.95">E</text>

  <!-- Accent accent dot (top right) -->
  <circle cx="205" cy="65" r="6" fill="url(#accentGrad)" opacity="0.8" filter="url(#iconGlow)"/>

  <!-- Subtle corner accent -->
  <circle cx="225" cy="128" r="4" fill="#EC4899" opacity="0.4"/>
</svg>
